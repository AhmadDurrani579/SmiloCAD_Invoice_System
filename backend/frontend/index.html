<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmiloCAD Dental Laboratory</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-icon">🦷</div>
      <div>
        <div class="topbar-name">SmiloCAD Dental Laboratory</div>
        <div class="topbar-sub">Invoice Management System</div>
      </div>
    </div>
    <div class="topbar-tabs">
      <button class="topbar-tab active" id="tab-invoice" onclick="App.showPage('invoice')">➕ New Invoice</button>
      <button class="topbar-tab"        id="tab-history" onclick="App.showPage('history')">📋 History</button>
    </div>
  </div>

  <div class="app-body" id="page-invoice">
    <div class="inv-card">
      
      <div class="inv-header-band">
        <div>
          <div class="lab-title">SmiloCAD Dental Laboratory</div>
          <div class="lab-meta">📍 Al Anayat Plaza, G11 Markaz Islamabad</div>
        </div>
        <div class="inv-badge-block">
          <div class="inv-badge-label">Invoice</div>
          <div id="display-inv-number" class="inv-number-pill">#NEW</div>
        </div>
      </div>

      <div class="inv-section">
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>Invoice No.</label>
            <input class="form-control" id="inv-number" value="Auto-Generated" readonly>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" class="form-control" id="inv-date">
          </div>
        </div>

        <div class="form-grid form-grid-3" style="margin-top: 15px;">
          <input class="form-control" id="doctor-name" placeholder="Dr. Name">
          <input class="form-control" id="clinic" placeholder="Clinic Name">
          <input class="form-control" id="patient" placeholder="Patient Name">
        </div>
        <div class="form-group" style="margin-top: 15px;">
           <label>Shade</label>
           <input class="form-control" id="shade" placeholder="e.g. A1, B2">
        </div>
      </div>

      <div class="inv-section">
        <div class="section-title">Services / Work Items</div>
        <table class="svc-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Description</th>
              <th>Qty</th>
              <th>Price (PKR)</th>
              <th>Total</th>
              <th>✕</th>
            </tr>
          </thead>
          <tbody id="rows-body">
            </tbody>
        </table>
        <button class="add-row-btn" onclick="Rows.add()">+ Add Row</button>
      </div>

      <div class="inv-section">
        <div style="max-width:300px; margin-left:auto;">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">PKR 0</span>
          </div>
          <div class="summary-row received">
            <span>Received</span>
            <input type="number" id="received-input" placeholder="0">
          </div>
          <div class="summary-row net">
            <span>Remaining</span>
            <span id="summary-remaining">PKR 0</span>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn btn-save" onclick="App.save()">💾 Save Invoice</button>
        <button class="btn btn-new" onclick="App.newInvoice()">📄 New</button>
      </div>

    </div>
  </div>

  <div class="app-body" id="page-history" style="display:none">
    <div class="hist-list" id="hist-list"></div>
  </div>

  <div id="toast"></div>

  <script src="/js/data.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/rows.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
